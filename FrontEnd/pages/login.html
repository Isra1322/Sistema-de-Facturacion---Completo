<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | SistemaFacturacion</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <main class="login-wrapper">
        <section class="login-visual-panel" aria-label="Panel institucional">
            <div class="visual-overlay"></div>

            <div class="visual-content">
                <header class="institutional-header">
                    <div class="logo-shell">
                        <img src="../../Resources/logo-fis.png" alt="Logo FIS" class="logo-top">
                    </div>

                    <div class="institutional-text">
                        <p>Sistema de Facturación</p>
                        <span>Universidad Técnica de Ambato</span>
                    </div>
                </header>

                <div class="welcome-container">
                    <h1>Bienvenido de nuevo</h1>
                    <p>
                        Inicia sesión para continuar gestionando tus clientes, productos y facturas con la mayor
                        eficiencia.
                    </p>
                </div>

                <footer class="visual-footer">
                    <span class="footer-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 10l8-5 8 5"></path>
                            <path d="M6 10v8"></path>
                            <path d="M10 10v8"></path>
                            <path d="M14 10v8"></path>
                            <path d="M18 10v8"></path>
                            <path d="M3 19h18"></path>
                        </svg>
                    </span>

                    <span>
                        <strong>Universidad Técnica de Ambato</strong>
                        <small>Campus Huachi</small>
                    </span>
                </footer>
            </div>
        </section>

        <section class="login-form-panel" aria-label="Formulario de inicio de sesión">
            <div class="login-card">
                <div class="login-header">
                    <div class="header-icon-circle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="4" y="10" width="16" height="10" rx="2"></rect>
                            <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
                        </svg>
                    </div>

                    <h2>Iniciar Sesión</h2>
                    <p>Ingresa tus credenciales para acceder</p>
                </div>

                <form id="loginForm" class="modern-form">
                    <div class="input-group">
                        <label for="correo">Correo electrónico</label>
                        <div class="input-control">
                            <span class="input-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                                    <path d="m3 7 9 6 9-6"></path>
                                </svg>
                            </span>
                            <input type="email" id="correo" placeholder="correo@ejemplo.com" autocomplete="email"
                                required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="input-control">
                            <span class="input-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="4" y="10" width="16" height="10" rx="2"></rect>
                                    <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
                                </svg>
                            </span>
                            <input type="password" id="password" placeholder="Ingresa tu contraseña"
                                autocomplete="current-password" required>
                            <button type="button" id="togglePassword" class="password-toggle-btn"
                                aria-label="Mostrar contraseña">
                                <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    aria-hidden="true">
                                    <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg id="eyeClosed" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" aria-hidden="true">
                                    <path d="M3 3l18 18"></path>
                                    <path d="M10.6 10.6A2 2 0 0 0 13.4 13.4"></path>
                                    <path d="M9.9 4.2A10.9 10.9 0 0 1 12 4c6 0 10 8 10 8a15.8 15.8 0 0 1-3 4.1"></path>
                                    <path d="M6.6 6.6C3.8 8.5 2 12 2 12s4 8 10 8a10.8 10.8 0 0 0 4.1-.8"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary-gradient">
                        <span>Iniciar Sesión</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" class="arrow-icon"
                            aria-hidden="true">
                            <path d="M5 12h14"></path>
                            <path d="m13 6 6 6-6 6"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <div id="toast-container"></div>

    <script src="../js/toast.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
